<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>galeria</title>
  </head>
  <body class="page">
    <div class="container galeria">
      <h1>📸 Memórias</h1>

      <div class="misterio">
        <img id="img" src="" />
        <p id="texto">❤️</p>
        <p>Algo especial está por vir...</p>
      </div>

      

      <button onclick="next()">➡️</button>
    </div>

    <a class="back-btn" href="home.html">⬅ Voltar</a>

    <script src="js/script.js"></script>

    <script>
      let imgs = [
        'imgs/sesi.jpeg',
        'imgs/nossa.jpeg',
        'imgs/missi.jpeg',
        'imgs/camp.jpeg',
        'imgs/arthur.jpeg'
      ]
      let i = 0

      function next() {
        i = (i + 1) % imgs.length
        document.getElementById('img').src = imgs[i]
      }
    </script>
  </body>
</html>
